{% if status == "completed" %}
  <span class="amare-status-pill bg-lesbian-green/25 text-text-strong">Concluido</span>
{% elif status == "in_progress" %}
  <span class="amare-status-pill bg-mandys-pink/45 text-text-strong">Em andamento</span>
{% elif status == "available" %}
  <span class="amare-status-pill bg-lesbian-green/25 text-text-strong">Liberado</span>
{% elif status == "approved" %}
  <span class="amare-status-pill bg-lesbian-green/25 text-text-strong">Aprovado</span>
{% elif status == "rejected" %}
  <span class="amare-status-pill bg-danger/15 text-text-strong">Rejeitado</span>
{% elif status == "locked" %}
  <span class="amare-status-pill bg-mandys-pink/35 text-text-strong">Aguardando liberacao</span>
{% else %}
  <span class="amare-status-pill border border-border bg-white text-text-muted">Pendente</span>
{% endif %}
