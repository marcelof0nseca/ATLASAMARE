<section class="amare-card p-6 sm:p-8">
  <p class="amare-kicker">Por enquanto</p>
  <h2 class="mt-2 font-serif text-2xl font-bold text-text-strong">{{ title }}</h2>
  <p class="mt-3 max-w-lg text-sm leading-6 text-text-muted">{{ copy }}</p>
  {% if action_url and action_label %}
    <a href="{{ action_url }}" class="amare-button-secondary mt-5">{{ action_label }}</a>
  {% endif %}
</section>
