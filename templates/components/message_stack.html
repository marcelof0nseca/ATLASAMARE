{% if messages %}
  <div class="fixed left-1/2 top-4 z-50 w-[min(32rem,calc(100vw-2rem))] -translate-x-1/2 space-y-2">
    {% for message in messages %}
      <div class="rounded-2xl border border-border bg-surface px-4 py-3 text-sm text-text-strong shadow-serene">{{ message }}</div>
    {% endfor %}
  </div>
{% endif %}
