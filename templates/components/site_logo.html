{% load static %}
{% if href %}
  <a href="{{ href }}" class="{{ wrapper_class|default:'' }} inline-flex flex-col items-start justify-center gap-2">
{% else %}
  <div class="{{ wrapper_class|default:'' }} inline-flex flex-col items-start justify-center gap-2">
{% endif %}
  <img
    src="{% static 'images/logoamare.png' %}"
    alt="AMARE"
    class="{{ image_class|default:'block h-auto w-full max-w-[14rem] object-contain' }}"
  >
  {% if subtitle %}
    <span class="pl-1 text-xs font-medium uppercase tracking-[0.18em] text-text-muted">{{ subtitle }}</span>
  {% endif %}
{% if href %}
  </a>
{% else %}
  </div>
{% endif %}
