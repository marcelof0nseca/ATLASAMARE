{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Clínica AMARE{% endblock %}</title>
    <meta name="description" content="Clareza e acolhimento para a jornada de fertilidade.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Bitter:wght@400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Bitter:wght@400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <link rel="icon" href="{% static 'images/amare-logo.png' %}">
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    <style>
      /* ── Barra de progresso de navegação ── */
      #amare-progress {
        position: fixed;
        top: 0; left: 0;
        height: 3px;
        width: 0%;
        background: var(--color-theme-patient, #c47d8c);
        z-index: 9999;
        border-radius: 0 2px 2px 0;
        opacity: 0;
        transition: opacity 0.2s ease;
        pointer-events: none;
      }
      #amare-progress.is-loading {
        opacity: 1;
        width: 65%;
        transition: width 2.5s cubic-bezier(0.1, 0.05, 0, 1), opacity 0.15s ease;
      }
      #amare-progress.is-done {
        width: 100%;
        opacity: 0;
        transition: width 0.15s ease, opacity 0.3s ease 0.15s;
      }

      /* ── Animação de entrada da página ── */
      @keyframes amare-page-in {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .amare-page-in {
        animation: amare-page-in 280ms cubic-bezier(0.4, 0, 0.2, 1) both;
      }

      /* ── Scroll performance ── */
      /*
        overflow-x: clip não cria scroll container nem stacking context,
        ao contrário de overflow-x: hidden. Isso libera o browser para
        compor camadas de GPU corretamente durante o scroll.
      */
      body {
        overflow-x: clip;
      }

      /*
        Promove a nav fixa para camada de GPU própria.
        Com will-change + translateZ(0), o browser não precisa recompor
        o conteúdo por baixo dela a cada frame de scroll.
        backdrop-filter removido: era a principal causa do jank
        (obrigava repaint+blur a cada frame de scroll).
      */
      .amare-bottom-nav {
        will-change: transform;
        transform: translateZ(0);
      }
    </style>
    {% block extra_head %}{% endblock %}
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
    <script src="{% static 'js/amare.js' %}" defer></script>
    <script>
      // Envia o CSRF token em todos os requests HTMX (necessário para POST com hx-boost)
      document.body.addEventListener("htmx:configRequest", function(evt) {
        const csrfToken = document.cookie.split(";")
          .map(c => c.trim())
          .find(c => c.startsWith("csrftoken="));
        if (csrfToken) {
          evt.detail.headers["X-CSRFToken"] = csrfToken.split("=")[1];
        }
      });
    </script>
  </head>
  <body class="relative" hx-boost="true" data-user-id="{% if request.user.is_authenticated %}{{ request.user.id }}{% endif %}">
    <div id="amare-progress"></div>
    <div class="pointer-events-none absolute inset-x-0 top-0 h-72 bg-gradient-to-b from-mandys-pink/20 via-linen to-transparent"></div>
    <div id="toast-root" class="fixed right-4 top-4 z-50 w-[min(24rem,calc(100vw-2rem))]"></div>
    <div id="modal-root" class="pointer-events-none fixed inset-0 z-40"></div>
    {% include "components/message_stack.html" %}
    {% block body %}{% endblock %}
  </body>
</html>
