<div class="pointer-events-auto flex min-h-screen items-end justify-center bg-text-strong/45 p-4 sm:items-center">
  <div class="amare-card w-full max-w-md p-6">
    <p class="amare-kicker">Confirmar dose</p>
    <h2 class="mt-3 font-serif text-3xl font-bold">{{ medication.name }}</h2>
    <p class="mt-3 text-sm leading-6 text-text-muted">
      Horario previsto: {{ medication.scheduled_for|date:"d/m \\a\\s H:i" }}. Confirme apenas se a dose ja foi tomada como orientada pela equipe.
    </p>
    <form
      method="post"
      action="{% url 'medications:complete' medication.id %}"
      hx-post="{% url 'medications:complete' medication.id %}"
      hx-target="#medication-row-{{ medication.id }}"
      hx-swap="outerHTML"
      class="mt-6 space-y-3"
    >
      {% csrf_token %}
      <button type="submit" class="amare-button-primary w-full">Registrar dose</button>
      <button type="button" class="amare-button-secondary w-full" onclick="document.getElementById('modal-root').innerHTML=''">Voltar</button>
    </form>
  </div>
</div>
