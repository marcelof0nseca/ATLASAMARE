<article id="medication-row-{{ medication.id }}" class="rounded-xl border border-border bg-white/80 p-4">
  <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <div class="min-w-0">
      <p class="break-words text-sm font-bold text-text-strong">{{ medication.name }}</p>
      <p class="mt-1 break-words text-sm text-text-muted">{{ medication.scheduled_for|date:"d/m \\a\\s H:i" }}</p>
      <div class="mt-3">
        {% include "components/status_badge.html" with status=medication.status %}
      </div>
    </div>
    {% if medication.status == "pending" %}
      <button
        class="amare-button-secondary w-full sm:w-auto"
        hx-get="{% url 'medications:confirm' medication.id %}"
        hx-target="#modal-root"
        hx-swap="innerHTML"
      >
        Marcar concluida
      </button>
    {% else %}
      <p class="text-sm font-bold text-text-strong">Registrada</p>
    {% endif %}
  </div>
</article>
