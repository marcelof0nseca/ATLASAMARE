<article id="medication-row-{{ medication.id }}" class="rounded-3xl border border-border bg-white p-4">
  <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <p class="text-sm font-semibold text-text-strong">{{ medication.name }}</p>
      <p class="mt-1 text-sm text-text-muted">{{ medication.scheduled_for|date:"d/m \\à\\s H:i" }}</p>
      <div class="mt-3">
        {% include "components/status_badge.html" with status=medication.status %}
      </div>
    </div>
    {% if medication.status == "pending" %}
      <button
        class="amare-button-secondary"
        hx-get="{% url 'medications:confirm' medication.id %}"
        hx-target="#modal-root"
        hx-swap="innerHTML"
      >
        Marcar como concluída
      </button>
    {% else %}
      <p class="text-sm text-success">Marcada com segurança.</p>
    {% endif %}
  </div>
</article>
