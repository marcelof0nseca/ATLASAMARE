databases:
  - name: atlas-amare-db
    plan: free
    databaseName: atlas_amare
    user: atlas_amare

services:
  - type: web
    name: atlas-amare
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate && python manage.py seed_amare_demo
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /landing/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: atlas-amare-db
          property: connectionString
      - key: MAYA_LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
